<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gift For Most Beutiful Girl ❤️</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    

    <!-- Start Button -->
     <button class="start-btn">
        Ready For Your Surprise?
     </button>



    <div class="holder">
        <video autoplay muted loop playsinline>
            <source  type="video/mp4">
            Your browser does not support the video tag.
        </video>

        <div class="start">
            <span class="start-text">3</span>
        </div>


        <div class="second">
            <img src="assets/love-gif.webp" alt="Love GIF">
        </div>


        <div class="third">

            <!-- BOOK -->
            <div class="book-container">
                <div class="book-wrapper">
                    <div class="book-spine"></div>
                    
                    <!-- Pages Container -->
                    <div class="book-pages">
                        <!-- COVER PAGE -->
                        <div class="book-page cover-page" data-page="0">
                            <div class="page-content">
                                <h2>Our Love Story</h2>
                                <p>Click right to begin...</p>
                            </div>
                        </div>

                        <!-- PHOTO PAGES - Add more by copying this block -->
                        <div class="book-page photo-page" data-page="1">
                            <div class="page-label">First Memory</div>
                            <img src="assets/photo1.jpg" alt="First Memory">
                        </div>

                        <div class="book-page photo-page" data-page="2">
                            <div class="page-label">Beautiful Moment</div>
                            <img src="assets/photo2.jpg" alt="Beautiful Moment">
                        </div>

                        <div class="book-page photo-page" data-page="3">
                            <div class="page-label">Us Together</div>
                            <img src="assets/photo3.jpg" alt="Us Together">
                        </div>

                        <!-- END PAGE -->
                        <div class="book-page end-page" data-page="4">
                            <div class="page-content">
                                <h2>Forever with You</h2>
                                <p>❤️ Happy Birthday ❤️</p>
                            </div>
                        </div>
                    </div>

                    <!-- Navigation Buttons -->
                    <div class="book-nav">
                        <button class="nav-btn nav-prev" id="prevBtn">← Previous</button>
                        <span class="page-counter"><span id="currentPage">1</span> / <span id="totalPages">5</span></span>
                        <button class="nav-btn nav-next" id="nextBtn">Next →</button>
                    </div>
                </div>
            </div>

        </div>
    </div>


    <script src="js/main.js"></script>
</body>
</html>
